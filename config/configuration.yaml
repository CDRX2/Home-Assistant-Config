
# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

# Uncomment this if you are using SSL/TLS, running in Docker container, etc.
# http:
#   base_url: example.duckdns.org:8123

# Text to speech
tts:
  - platform: google_translate

lovelace:
  mode: storage
  dashboards:
    lovelace-visual:
      mode: yaml
      title: Visual
      icon: mdi:floor-plan
      show_in_sidebar: true
      filename: visual.yaml
    lovelace-dev:
      mode: yaml
      title: Dev
      icon: mdi:github
      show_in_sidebar: true
      filename: dev.yaml
    lovelace-remote:
      mode: yaml
      title: Remote
      icon: mdi:remote-tv
      show_in_sidebar: true
      filename: remote.yaml

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
sensor: !include_dir_merge_list sensors/

homeassistant:
  customize: !include customize.yaml

browser_mod:
  devices:
    7cd8f43d-f1e2fb4d:
      name: CDRXPS_chrome
    1ca3e9c8 29c5fdd7:
      name: CDRX2_App
    89534705-fa304c6a:
      name: NanneHuawei_App
    eae7e411-f2908d51:
      name: NanneHuawei_chrome
    2c088d82-ca71ed40:
      name: CDRX2_chrome
    9e06779f-8aa8373e:
      name: Tab_rez
      force_stay_awake: true
    86f66e1b-f1dcabf4:
      name: Tab_remote
      force_stay_awake: true

discovery:
media_player:
  - platform: openhome

  - platform: asyncpioneer
    host: !secret AVR_Host
    port: !secret AVR_Port

webostv:
  - host: !secret TV_Host
    name: Living_Room_TV
    turn_on_action:
      service: wake_on_lan.send_magic_packet
      data:
        mac: !secret TV_MAC

wake_on_lan:

frontend:
  themes: !include_dir_merge_named themes/

sabnzbd:
  api_key: !secret SABNzbd_API
  host: !secret SABNzbd_Host
  port: !secret SABNzbd_Port
  sensors:
    - current_status
    - speed
    - queue_size
    - queue_remaining
    - queue_count
    - day_size
    - week_size
    - month_size
    - total_size

garbage_collection:
  sensors:
  - name: "Poubelle, Compost, Papier"
    frequency: "weekly"
    icon_today: mdi:delete-empty
    icon_tomorrow: mdi:delete-restore
    collection_days: "wed"
    verbose_state: true
    verbose_format: '{date}'
    date_format: '%A %-d %B'
    move_country_holidays: CH
  - name: "Verre"
    frequency: "monthly"
    collection_days: "wed"
    weekday_order_number:
    - 2
    - 4
    icon_normal: mdi:bottle-wine
    icon_today: mdi:delete-empty
    icon_tomorrow: mdi:delete-restore
    verbose_state: true
    verbose_format: '{date}'    
    date_format: '%A %-d %B'
    move_country_holidays: CH  

skodaconnect:
  username: !secret Skoda_Username
  password: !secret Skoda_Password
  spin: !secret Skoda_PIN
  scandinavian_miles: false
  scan_interval:
    minutes: 5
  name:
    !secret Skoda_VIN: 'Ciboulette'

google:
  client_id: !secret Google_Client_Id
  client_secret: !secret Google_Client_Secret

remote:
  - platform: itach
    host: !secret itach_host
    devices:
      - name: swisscom
        connaddr: 3
        commands:
          - name: Power
            data: "0000 006D 0000 000C 000B 0017 0017 0017 0017 0017 0017 000B 000B 0017 0017 0017 000B 000B 000B 000B 0017 0017 0017 000B 000B 0017 000B 0D37"
          - name: Up
            data: "0000 006B 0000 000C 000C 0018 0018 0018 0018 0018 0018 000C 000C 0018 0018 0018 000C 000C 000C 000C 0018 000C 000C 0018 000C 000C 0018 0D64"
